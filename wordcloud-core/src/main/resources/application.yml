spring:
  application:
    name: wordcloud-core
  datasource:
    url: ${SPRING_POSTGRES_URL:jdbc:postgresql://localhost:5432/wordcloud}
    username: ${SPRING_POSTGRES_USERNAME:wordcloud}
    password: ${SPRING_POSTGRES_PASSWORD:wordcloud}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

wordcloud:
  rabbitmq:
    exchange: wordcloud.exchange
    queue: wordcloud.chunks
    routing-key: chunk.process
  chunk-size-bytes: 1048576
